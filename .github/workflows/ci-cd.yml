name: CI/CD

on: [push]

env:
  AWS_REGION: eu-central-1
  AWS_ROLE_TO_ASSUME: arn:aws:iam::990393187402:role/test-role-github
  LAMBDA_FUNCTION_NAME: calculator-app

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: 01-ci-lab

    strategy:
      matrix:
        version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.version }}

      - name: Use cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{runner.os}}-${{ hashFiles('01-ci-lab/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test
        run: pytest

  deploy:
    runs-on: ubuntu-latest

    needs: test

    defaults:
      run:
        working-directory: 01-ci-lab

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare Lambda package
        run: |
          # The deploy target expects the handler module to be named lambda_function.py.
          cp app/calculator.py lambda_function.py
          zip function.zip lambda_function.py

      - name: Update Lambda package
        run: |
          # In this workshop repository the Lambda may be created manually before CI is wired up.
          if aws lambda get-function --function-name "$LAMBDA_FUNCTION_NAME" >/dev/null 2>&1; then
            aws lambda update-function-code \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --zip-file fileb://function.zip
          else
            echo "Skipping deploy because Lambda function $LAMBDA_FUNCTION_NAME does not exist in $AWS_REGION."
          fi
